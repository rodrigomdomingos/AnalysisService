server:
  port: 9092

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: America/Sao_Paulo
    show-sql: false
  jackson:
    time-zone: America/Sao_Paulo

logging:
  level:
    root: WARN
    com.analysis: INFO
